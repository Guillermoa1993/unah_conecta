version: "3.9"

services:
  # ── Aplicación en producción (build + Nginx) ─────────────────────────────
  conecta-pumas:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: conecta-pumas-app
    ports:
      - "3000:80"         # Acceder en http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Servidor de desarrollo (hot-reload) ──────────────────────────────────
  conecta-pumas-dev:
    image: node:22-alpine
    container_name: conecta-pumas-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules        # volumen anónimo para no sobreescribir node_modules del host
    ports:
      - "5185:5185"              # Acceder en http://localhost:5185
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
    profiles:
      - dev                      # Solo se activa con: docker compose --profile dev up
